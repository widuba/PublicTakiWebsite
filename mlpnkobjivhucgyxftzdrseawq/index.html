<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow, noarchive" />
<title>Taki — Review Console</title>
<link rel="stylesheet" href="../styles.css" />
</head>
<body class="site-review">
<div class="wrap">
  <h1>Review Console</h1>
  <p class="sub">Suspended accounts awaiting review. This page is private — do not link or share it.</p>

  <div class="bar">
    <input id="secret" type="password" placeholder="Admin secret" autocomplete="off" />
    <button class="primary" id="load">Load queue</button>
    <button id="clear">Forget secret</button>
  </div>
  <div class="msg" id="msg"></div>
  <div id="queue"></div>

  <div class="foot">Terminate &amp; Ban is <b>permanent</b> and cannot be undone — it bans the account, its device(s), IP(s), and any linked Apple ID(s).</div>
</div>

<script>
  const API = "https://takiaiserver.onrender.com";
  const $ = (id) => document.getElementById(id);
  const secretEl = $("secret"), msgEl = $("msg"), queueEl = $("queue");

  // Keep the secret only for this tab's session (cleared when the tab closes).
  secretEl.value = sessionStorage.getItem("taki_admin_secret") || "";
  secretEl.addEventListener("input", () => sessionStorage.setItem("taki_admin_secret", secretEl.value));
  $("clear").onclick = () => { sessionStorage.removeItem("taki_admin_secret"); secretEl.value = ""; setMsg("Secret cleared.", "ok"); };

  function setMsg(t, kind){ msgEl.textContent = t || ""; msgEl.className = "msg" + (kind ? " " + kind : ""); }
  function esc(s){ return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function fmt(ts){ try { return new Date(ts).toLocaleString(); } catch { return ""; } }

  async function api(path, body){
    const res = await fetch(API + path, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(Object.assign({ secret: secretEl.value }, body || {}))
    });
    if (res.status === 403) throw new Error("Forbidden — wrong admin secret.");
    if (!res.ok) throw new Error("Request failed (" + res.status + ").");
    return res.json();
  }

  async function loadQueue(){
    if (!secretEl.value) return setMsg("Enter the admin secret first.", "err");
    setMsg("Loading…");
    try {
      const data = await api("/api/admin/flagged");
      render(data.queue || []);
      setMsg((data.queue || []).length + " account(s) awaiting review.", "ok");
    } catch (e) { setMsg(e.message, "err"); }
  }

  function render(queue){
    if (!queue.length){ queueEl.innerHTML = '<div class="empty">No suspended accounts. 🎉</div>'; return; }
    queueEl.innerHTML = queue.map(a => {
      const viols = (a.violations || []).map(v =>
        `<div class="viol"><div class="cat">${esc(v.category)}</div>`
        + `<div class="txt">${esc(v.text)}</div>`
        + `<div class="when">${esc(fmt(v.at))}${v.ip ? " · IP " + esc(v.ip) : ""}${v.deviceId ? " · dev " + esc(v.deviceId) : ""}</div></div>`
      ).join("");
      return `<div class="acct" data-id="${esc(a.identity)}">
        <div class="acct-head"><span class="ident">${esc(a.identity)}</span><span class="pill">${esc(a.status)} · ${a.strikes} strikes</span></div>
        <div class="meta">Flagged messages retained for review:</div>
        ${viols || '<div class="meta">(none)</div>'}
        <div class="actions">
          <button class="reinstate" data-act="reinstate">Reinstate</button>
          <button class="terminate" data-act="terminate">Terminate &amp; Ban (permanent)</button>
        </div></div>`;
    }).join("");
  }

  queueEl.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-act]"); if (!btn) return;
    const card = btn.closest(".acct"); const id = card.getAttribute("data-id"); const act = btn.getAttribute("data-act");
    if (act === "terminate" && !confirm("Permanently ban this account, its devices, IP(s), and linked Apple ID(s)?\n\nThis CANNOT be undone.\n\n" + id)) return;
    if (act === "reinstate" && !confirm("Reinstate this account and clear its strikes?\n\n" + id)) return;
    btn.disabled = true; setMsg((act === "terminate" ? "Terminating " : "Reinstating ") + id + "…");
    try {
      const r = await api("/api/admin/" + act, { identity: id });
      card.remove();
      if (act === "terminate") {
        const b = r.banned || {};
        setMsg("Terminated. Banned " + (b.identities || []).length + " identity(ies), " + (b.devices || []).length + " device(s), " + (b.ips || []).length + " IP(s).", "ok");
      } else setMsg("Reinstated " + id + ".", "ok");
    } catch (err) { btn.disabled = false; setMsg(err.message, "err"); }
  });

  $("load").onclick = loadQueue;
  secretEl.addEventListener("keydown", (e) => { if (e.key === "Enter") loadQueue(); });
</script>
</body>
</html>
